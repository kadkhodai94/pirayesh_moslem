name: Build Latest Flutter ZIP

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build APK and AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find latest ZIP
        shell: bash
        run: |
          set -e

          ZIP_FILE=$(find . -maxdepth 1 -type f -name "*.zip" -printf "%T@ %p\n" | sort -nr | head -n 1 | cut -d' ' -f2-)

          if [ -z "$ZIP_FILE" ]; then
            echo "No ZIP file found in repository root"
            exit 1
          fi

          ZIP_FILE="${ZIP_FILE#./}"

          echo "Selected ZIP: $ZIP_FILE"
          echo "ZIP_FILE=$ZIP_FILE" >> $GITHUB_ENV

      - name: Unzip source
        shell: bash
        run: |
          set -e

          rm -rf extracted_project
          mkdir -p extracted_project

          unzip -q "$ZIP_FILE" -d extracted_project

          echo "Extracted:"
          find extracted_project -maxdepth 3 -type f | head -n 80

      - name: Locate Flutter project
        shell: bash
        run: |
          set -e

          PUBSPEC_PATH=$(find extracted_project -type f -name "pubspec.yaml" | head -n 1)

          if [ -z "$PUBSPEC_PATH" ]; then
            echo "pubspec.yaml not found"
            exit 1
          fi

          PROJECT_DIR=$(dirname "$PUBSPEC_PATH")

          echo "Flutter project found: $PROJECT_DIR"
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV

      - name: Patch Android JVM target
        shell: bash
        run: |
          set -e

          APP_GRADLE="$PROJECT_DIR/android/app/build.gradle"

          if [ ! -f "$APP_GRADLE" ]; then
            echo "android/app/build.gradle not found"
            exit 1
          fi

          echo "Patching JVM target in: $APP_GRADLE"

          python3 <<'PY'
import os
import re
from pathlib import Path

project_dir = Path(os.environ["PROJECT_DIR"])
app_gradle = project_dir / "android" / "app" / "build.gradle"

text = app_gradle.read_text(encoding="utf-8")

text = text.replace("JavaVersion.VERSION_1_8", "JavaVersion.VERSION_17")
text = text.replace("sourceCompatibility = 1.8", "sourceCompatibility = JavaVersion.VERSION_17")
text = text.replace("targetCompatibility = 1.8", "targetCompatibility = JavaVersion.VERSION_17")
text = text.replace("sourceCompatibility 1.8", "sourceCompatibility JavaVersion.VERSION_17")
text = text.replace("targetCompatibility 1.8", "targetCompatibility JavaVersion.VERSION_17")

text = re.sub(r'jvmTarget\s*=\s*["\']1\.8["\']', 'jvmTarget = "17"', text)
text = re.sub(r'jvmTarget\s*=\s*["\']11["\']', 'jvmTarget = "17"', text)
text = re.sub(r'jvmTarget\s*=\s*["\']17["\']', 'jvmTarget = "17"', text)

if "compileOptions" not in text:
    text = re.sub(
        r'android\s*\{',
        '''android {
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
''',
        text,
        count=1
    )

if "kotlinOptions" not in text:
    text = re.sub(
        r'android\s*\{',
        '''android {
    kotlinOptions {
        jvmTarget = "17"
    }
''',
        text,
        count=1
    )

app_gradle.write_text(text, encoding="utf-8")

print("---- patched android/app/build.gradle ----")
print(app_gradle.read_text(encoding="utf-8"))
PY

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter doctor
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          flutter --version
          flutter doctor -v

      - name: Flutter pub get
        working-directory: ${{ env.PROJECT_DIR }}
        run: flutter pub get

      - name: Flutter clean
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          flutter clean
          flutter pub get

      - name: Build APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          flutter build apk --release --no-shrink \
            --build-name=1.0.0 \
            --build-number=1

      - name: Build AAB
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          flutter build appbundle --release --no-shrink \
            --build-name=1.0.0 \
            --build-number=1

      - name: Collect outputs
        shell: bash
        run: |
          set -e

          rm -rf release_outputs
          mkdir -p release_outputs

          ZIP_BASE=$(basename "$ZIP_FILE" .zip)

          APK_PATH=$(find "$PROJECT_DIR/build/app/outputs/flutter-apk" -type f -name "*.apk" | head -n 1)
          AAB_PATH=$(find "$PROJECT_DIR/build/app/outputs/bundle/release" -type f -name "*.aab" | head -n 1)

          cp "$APK_PATH" "release_outputs/${ZIP_BASE}-release.apk"
          cp "$AAB_PATH" "release_outputs/${ZIP_BASE}-release.aab"

          ls -lh release_outputs

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: flutter-release-output
          path: release_outputs/*
