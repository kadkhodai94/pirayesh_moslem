name: Build Latest Flutter ZIP

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build APK and AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find latest ZIP
        shell: bash
        run: |
          set -e

          ZIP_FILE=$(find . -maxdepth 1 -type f -name "*.zip" -printf "%T@ %p\n" | sort -nr | head -n 1 | cut -d' ' -f2-)

          if [ -z "$ZIP_FILE" ]; then
            echo "No ZIP file found in repository root"
            exit 1
          fi

          ZIP_FILE="${ZIP_FILE#./}"

          echo "Selected ZIP: $ZIP_FILE"
          echo "ZIP_FILE=$ZIP_FILE" >> "$GITHUB_ENV"

      - name: Unzip source
        shell: bash
        run: |
          set -e

          rm -rf extracted_project
          mkdir -p extracted_project

          unzip -q "$ZIP_FILE" -d extracted_project

          echo "Extracted files:"
          find extracted_project -maxdepth 3 -type f | head -n 80

      - name: Locate Flutter project
        shell: bash
        run: |
          set -e

          PUBSPEC_PATH=$(find extracted_project -type f -name "pubspec.yaml" | head -n 1)

          if [ -z "$PUBSPEC_PATH" ]; then
            echo "pubspec.yaml not found"
            exit 1
          fi

          PROJECT_DIR=$(dirname "$PUBSPEC_PATH")

          echo "Flutter project found: $PROJECT_DIR"
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"

      - name: Patch Android JVM target
        shell: bash
        run: |
          set -e

          APP_GRADLE="$PROJECT_DIR/android/app/build.gradle"

          if [ ! -f "$APP_GRADLE" ]; then
            echo "android/app/build.gradle not found"
            exit 1
          fi

          echo "Patching: $APP_GRADLE"

          sed -i 's/JavaVersion.VERSION_1_8/JavaVersion.VERSION_17/g' "$APP_GRADLE"
          sed -i 's/jvmTarget = "1.8"/jvmTarget = "17"/g' "$APP_GRADLE"
          sed -i "s/jvmTarget = '1.8'/jvmTarget = '17'/g" "$APP_GRADLE"
          sed -i 's/jvmTarget = "11"/jvmTarget = "17"/g' "$APP_GRADLE"
          sed -i "s/jvmTarget = '11'/jvmTarget = '17'/g" "$APP_GRADLE"

          if ! grep -q "compileOptions" "$APP_GRADLE"; then
            awk '
              /android[[:space:]]*\{/ && added == 0 {
                print
                print "    compileOptions {"
                print "        sourceCompatibility JavaVersion.VERSION_17"
                print "        targetCompatibility JavaVersion.VERSION_17"
                print "    }"
                added = 1
                next
              }
              { print }
            ' "$APP_GRADLE" > "$APP_GRADLE.tmp"
            mv "$APP_GRADLE.tmp" "$APP_GRADLE"
          fi

          if ! grep -q "kotlinOptions" "$APP_GRADLE"; then
            awk '
              /android[[:space:]]*\{/ && added == 0 {
                print
                print "    kotlinOptions {"
                print "        jvmTarget = \"17\""
                print "    }"
                added = 1
                next
              }
              { print }
            ' "$APP_GRADLE" > "$APP_GRADLE.tmp"
            mv "$APP_GRADLE.tmp" "$APP_GRADLE"
          fi

          echo "Patched build.gradle:"
          cat "$APP_GRADLE"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter doctor
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          flutter --version
          flutter doctor -v

      - name: Flutter pub get
        working-directory: ${{ env.PROJECT_DIR }}
        run: flutter pub get

      - name: Flutter clean
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          flutter clean
          flutter pub get

      - name: Build APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          flutter build apk --release --no-shrink --build-name=1.0.0 --build-number=1

      - name: Build AAB
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          flutter build appbundle --release --no-shrink --build-name=1.0.0 --build-number=1

      - name: Collect outputs
        shell: bash
        run: |
          set -e

          rm -rf release_outputs
          mkdir -p release_outputs

          ZIP_BASE=$(basename "$ZIP_FILE" .zip)

          APK_PATH=$(find "$PROJECT_DIR/build/app/outputs/flutter-apk" -type f -name "*.apk" | head -n 1)
          AAB_PATH=$(find "$PROJECT_DIR/build/app/outputs/bundle/release" -type f -name "*.aab" | head -n 1)

          cp "$APK_PATH" "release_outputs/${ZIP_BASE}-release.apk"
          cp "$AAB_PATH" "release_outputs/${ZIP_BASE}-release.aab"

          echo "Final outputs:"
          ls -lh release_outputs

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: flutter-release-output
          path: release_outputs/*
